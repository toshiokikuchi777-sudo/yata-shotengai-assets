<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ───────── LevelGenV2（迷路：再帰的バックトラッカー＋braid。Luau/Pythonと同一） ─────────
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const COLORS=['aka','ao','midori','ki','murasaki'];
const W=6,H=10,BRAID=0.6,NS=3;  // BRAID大=抜け道(逃げ道ループ)多 / NS=1区画の店数
function generate(seed){
  const rng=mulberry32(seed>>>0);
  const D={N:[0,1],S:[0,-1],E:[1,0],W:[-1,0]}, OPP={N:'S',S:'N',E:'W',W:'E'};
  const ri=(a,b)=>a+Math.floor(rng()*(b-a+1)); const k=(x,y)=>x+','+y; const inb=(x,y)=>x>=0&&x<W&&y>=0&&y<H;
  const zoneOf=gy=>gy<=1?0:gy<=5?1:gy<=6?2:3;  // 0安全(入口) 1本通り 2広場帯 3鳥居前
  const shuf=a=>{for(let i=a.length-1;i>0;i--){const j=ri(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;};
  const opens={}, all=[];
  for(let x=0;x<W;x++)for(let y=0;y<H;y++){opens[k(x,y)]={}; all.push([x,y]);}
  let sx=ri(0,W-1); const start={gx:sx,gy:0};
  const vis={[k(sx,0)]:1}, st=[[sx,0]];
  while(st.length){const c=st[st.length-1]; const nb=[];
    for(const d in D){const nx=c[0]+D[d][0],ny=c[1]+D[d][1]; if(inb(nx,ny)&&!vis[k(nx,ny)])nb.push([d,nx,ny]);}
    if(nb.length){const p=nb[ri(0,nb.length-1)]; opens[k(c[0],c[1])][p[0]]=1; opens[k(p[1],p[2])][OPP[p[0]]]=1; vis[k(p[1],p[2])]=1; st.push([p[1],p[2]]);}
    else st.pop();}
  const deg=o=>Object.keys(o).length;
  for(const c of all){const o=opens[k(c[0],c[1])];
    if(deg(o)===1&&rng()<BRAID){const cand=[];
      for(const d in D){const nx=c[0]+D[d][0],ny=c[1]+D[d][1]; if(inb(nx,ny)&&!o[d])cand.push([d,nx,ny]);}
      if(cand.length){const p=cand[ri(0,cand.length-1)]; o[p[0]]=1; opens[k(p[1],p[2])][OPP[p[0]]]=1;}}}
  const bfs=(ax,ay)=>{const dist={[k(ax,ay)]:0},q=[[ax,ay]]; let h=0;
    while(h<q.length){const c=q[h++]; for(const d in opens[k(c[0],c[1])]){const nx=c[0]+D[d][0],ny=c[1]+D[d][1],nk=k(nx,ny);
      if(opens[nk]&&dist[nk]===undefined){dist[nk]=dist[k(c[0],c[1])]+1; q.push([nx,ny]);}}} return dist;};
  const dstart=bfs(sx,0);
  const cells={}; for(const c of all)cells[k(c[0],c[1])]={gx:c[0],gy:c[1],kind:'road',opens:opens[k(c[0],c[1])]};
  // ゴール＝奥の行(gy>=H-2)に限定して最遠点（＝一方向の濃度勾配を毎回固定）＋できれば行き止まり
  let goal=start,gb=-1; for(const c of all){if(c[1]<H-2)continue; const kk=k(c[0],c[1]); const sc=(dstart[kk]??-1)*2+(deg(opens[kk])===1?1:0); if(sc>gb){gb=sc;goal={gx:c[0],gy:c[1]};}}
  if(gb<0)for(const c of all){const kk=k(c[0],c[1]); const sc=(dstart[kk]??-1); if(sc>gb){gb=sc;goal={gx:c[0],gy:c[1]};}}
  cells[k(goal.gx,goal.gy)].kind='gate';
  // 大通り＝最短ルート(入口→鳥居)。順序付きでも保持（LOS加工に使う）
  const spine=new Set(),spineArr=[];
  {let cx=goal.gx,cy=goal.gy;
    while(!(cx===start.gx&&cy===start.gy)){spine.add(k(cx,cy)); spineArr.push([cx,cy]); const cd=dstart[k(cx,cy)]; let mv=null;
      for(const d in opens[k(cx,cy)]){const nx=cx+D[d][0],ny=cy+D[d][1]; if(dstart[k(nx,ny)]===cd-1){mv=[nx,ny];break;}}
      if(!mv)break; cx=mv[0];cy=mv[1];}
    spine.add(k(start.gx,start.gy)); spineArr.push([start.gx,start.gy]); spineArr.reverse();}
  // LOS：大通りの直線が3マス続いたら横へ逃げ分岐を1本足す（一本道で詰む理不尽を防ぐ＝角で逃げられる）
  {let run=0,pd=null;
   for(let i=0;i<spineArr.length-1;i++){const a=spineArr[i],b=spineArr[i+1];
     const dx=b[0]-a[0],dy=b[1]-a[1],dd=dx!==0?(dx>0?'E':'W'):(dy>0?'N':'S');
     run=(dd===pd)?run+1:0; pd=dd;
     if(run>=2){const perp=(dd==='N'||dd==='S')?['E','W']:['N','S'];
       for(const pp of perp){const nx=a[0]+D[pp][0],ny=a[1]+D[pp][1]; if(inb(nx,ny)&&!opens[k(a[0],a[1])][pp]){opens[k(a[0],a[1])][pp]=1; opens[k(nx,ny)][OPP[pp]]=1; break;}}
       run=0;}}}
  for(const c of all){const kk=k(c[0],c[1]); cells[kk].tier=(spine.has(kk)||deg(opens[kk])>=3)?'street':'alley'; cells[kk].zone=zoneOf(c[1]);}
  // 抜け道：大通り↔裏道をつなぐ通り抜け（逃げ道）を数本
  const passages=[];
  {const cands=[];
   for(const c of all){const kk=k(c[0],c[1]); if(cells[kk].tier!=='street')continue;
     for(const d in D){if(opens[kk][d])continue; const nx=c[0]+D[d][0],ny=c[1]+D[d][1],nk=k(nx,ny);
       if(cells[nk]&&cells[nk].tier==='alley')cands.push([c[0],c[1],d,nx,ny]);}}
   shuf(cands);
   const n=Math.min(cands.length,ri(3,5));
   for(let i=0;i<n;i++){const p=cands[i]; opens[k(p[0],p[1])][p[2]]=1; opens[k(p[3],p[4])][OPP[p[2]]]=1; passages.push({gx:p[0],gy:p[1],side:p[2]});}}
  // 行き止まり一覧（神社＋隠れ部屋に使う）
  const deads=all.filter(c=>deg(opens[k(c[0],c[1])])===1&&!(c[0]===start.gx&&c[1]===start.gy)&&!(c[0]===goal.gx&&c[1]===goal.gy));
  shuf(deads);
  let shrine=null;
  if(deads.length){let b=-1; for(const c of deads){const dd=dstart[k(c[0],c[1])]??0; if(dd>b){b=dd;shrine={gx:c[0],gy:c[1]};}}}
  else{let bd=99; for(const c of all){if((c[0]===start.gx&&c[1]===start.gy)||(c[0]===goal.gx&&c[1]===goal.gy))continue; const dg=deg(opens[k(c[0],c[1])]); if(dg<bd){bd=dg;shrine={gx:c[0],gy:c[1]};}}}
  if(shrine)cells[k(shrine.gx,shrine.gy)].kind='shrine';
  // 隠れ部屋＝別の行き止まり（全色の物陰がある安全部屋／追い込まれると詰むリスク＝駆け引き）
  let hideroom=null;
  for(const c of deads){if(shrine&&c[0]===shrine.gx&&c[1]===shrine.gy)continue; cells[k(c[0],c[1])].kind='hideroom'; hideroom={gx:c[0],gy:c[1]}; break;}
  let roadc=all.filter(c=>cells[k(c[0],c[1])].kind==='road'&&!(c[0]===start.gx&&c[1]===start.gy));
  shuf(roadc);
  roadc.sort((a,b)=>deg(opens[k(b[0],b[1])])-deg(opens[k(a[0],a[1])]));
  let plaza=null; if(roadc.length){plaza={gx:roadc[0][0],gy:roadc[0][1]}; cells[k(plaza.gx,plaza.gy)].kind='plaza';}
  // コヤッキー店＝レア：中央寄りの大通りに1軒だけ（中継ランドマーク）
  let avail=all.filter(c=>cells[k(c[0],c[1])].kind==='road'&&spine.has(k(c[0],c[1]))&&Math.abs(c[1]-Math.floor(H/2))<=2);
  if(!avail.length)avail=all.filter(c=>cells[k(c[0],c[1])].kind==='road'&&cells[k(c[0],c[1])].tier==='street');
  shuf(avail);
  let koyakkey=null;
  if(avail.length){const c=avail[0]; cells[k(c[0],c[1])].kind='koyakkey'; koyakkey={gx:c[0],gy:c[1]};}
  // 隠れ色：各シャッターを別々の色に。色はバッグ循環で均等＝合う色が必ず近い（理不尽防止）
  let _bag=[];
  const nextColor=()=>{if(!_bag.length){_bag=[...COLORS];shuf(_bag);}return _bag.pop();};
  const shopColors=()=>{const o=[];for(let i=0;i<NS;i++)o.push(nextColor());return o;};
  const hide=[];
  for(const c of all){const cc=cells[k(c[0],c[1])];
    if(cc.kind!=='shrine'&&cc.kind!=='hideroom'&&cc.tier==='street')for(const d of ['N','S','E','W'])if(!cc.opens[d])hide.push({gx:c[0],gy:c[1],side:d,colors:shopColors()});}
  // お札動線：各ゾーン最低1枚＋大通り7:裏道3＋最後の1枚は鳥居前（巡る理由＝退屈と理不尽を消す）
  const fcand=all.filter(c=>!(c[0]===start.gx&&c[1]===start.gy)&&!(c[0]===goal.gx&&c[1]===goal.gy));
  const onSpine=c=>spine.has(k(c[0],c[1]));
  let sp=fcand.filter(onSpine),al=fcand.filter(c=>!onSpine(c)); shuf(sp); shuf(al);
  const nF=Math.min(fcand.length,5+ri(2,3));
  const used=new Set(),pick=[];
  const guard=spineArr.length>=2?spineArr[spineArr.length-2]:null;  // 鳥居前
  for(let z=0;z<=3;z++){const pool=fcand.filter(c=>zoneOf(c[1])===z&&!used.has(k(c[0],c[1]))); if(pool.length&&pick.length<nF){const c=pool[ri(0,pool.length-1)]; used.add(k(c[0],c[1])); pick.push(c);}}
  const draw=arr=>{while(arr.length){const c=arr.pop(); if(!used.has(k(c[0],c[1]))){used.add(k(c[0],c[1]));return c;}}return null;};
  while(pick.length<nF){let c=(rng()<0.7?draw(sp):draw(al)); if(!c)c=draw(sp)||draw(al); if(!c)break; pick.push(c);}
  if(guard&&pick.length)pick[pick.length-1]=[guard[0],guard[1]];
  const seen=new Set(),uniq=[]; for(const c of pick){const ck=k(c[0],c[1]); if(!seen.has(ck)){seen.add(ck);uniq.push(c);}}
  const fragments=uniq.map((c,i)=>({gx:c[0],gy:c[1],color:COLORS[i%COLORS.length]}));
  // 八尺様＝中央（startともゴールとも分離）。能動狩りで寄る前提
  const ccx=Math.floor(W/2),ccy=Math.floor(H/2);
  let yas=start,yb=1e9; for(const c of all){if((c[0]===start.gx&&c[1]===start.gy)||(c[0]===goal.gx&&c[1]===goal.gy))continue; const d2=(c[0]-ccx)**2+(c[1]-ccy)**2; if(d2<yb){yb=d2;yas={gx:c[0],gy:c[1]};}}
  // 巡回点（中央・広場・大通り中間）＋鳥居前の張り込み点＋最奥の火の見櫓（超遠ランドマーク）
  const patrolNodes=[yas]; if(plaza)patrolNodes.push(plaza); if(spineArr.length)patrolNodes.push({gx:spineArr[Math.floor(spineArr.length/2)][0],gy:spineArr[Math.floor(spineArr.length/2)][1]});
  const guardNode=guard?{gx:guard[0],gy:guard[1]}:null;
  const beaconTower={gx:goal.gx,gy:H};
  return {seed,W,H,cells,hideSpots:hide,fragments,start,goal,yasaki:yas,plaza,shrine,koyakkey,hideroom,passages,patrolNodes,guardNode,beaconTower};
}

// ───────── ブロック形状（MapBuilderV2と同一寸法・GRID=24） ─────────
const GRID=24,HALF=12,WH=14,WT=1.4,FT=0.6;
const C={ road:0x302f38, wood:0x3a2a20, sign:0xcec4aa, torii:0x962c26, leaf:0x284e30, trunk:0x30241a,
  stone:0x60625e, plaza:0x46464c, fuda:0xe8e0be, yasaki:0xcecabe, shopK:0x3c3240 };
const CRGB={ aka:0xc8382c, ao:0x2f6fb0, midori:0x3f9d54, ki:0xd8b32a, murasaki:0x7b4ea3 };
const DV={N:[0,0,1],S:[0,0,-1],E:[1,0,0],W:[-1,0,0]};

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace; app.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0c0c12); scene.fog=new THREE.FogExp2(0x0c0c12,0.0016);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.5,3000);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true;
scene.add(new THREE.HemisphereLight(0xbcc4d6,0x2a2a32,1.45));
const dir=new THREE.DirectionalLight(0xfff4e6,1.7); dir.position.set(80,160,60); scene.add(dir);
scene.add(new THREE.AmbientLight(0x404048,0.5));

const shopModels={};
const gltfLoader=new GLTFLoader();
function loadShops(){
  return Promise.all(['aka','ao','midori','ki','murasaki'].map(k=>new Promise(res=>{
    gltfLoader.load('shop_'+k+'.glb?v=1', g=>{shopModels[k]=g.scene; res();}, undefined, ()=>res());
  })));
}
let town=new THREE.Group(); scene.add(town);
// ───────── 歩行モード（Walking.fbx→walking.glb） ─────────
let curL=null, mode='orbit', walkChar=null, mixer=null, walkAction=null, view='tps', role='human';
const AVA={};  // role -> {obj,mixer,action,cfg}
const clock=new THREE.Clock(), keys={}, camRay=new THREE.Raycaster();
const player={x:0,z:0,yaw:0}, camRig={yaw:0,pitch:0.5,dist:16};
const CHAR_R=1.8;
let CHAR_H=5.6, CHAR_FWD=0, WALK_SPD=22, RUN_SPD=42, ANIM_TS=1.05, ANIM_TS_RUN=1.7;
// 役割ごとの見た目・性能（八尺様＝高く・速く）
const ROLES={
  human:  {glb:'walking.glb?v=1',    raw:1.882, h:5.6, walk:22, run:42, fwd:0, ts:1.05, tsRun:1.7},
  yasaki: {glb:'yasaki_play.glb?v=1', raw:1.873, h:9.4, walk:30, run:54, fwd:0, ts:1.15, tsRun:1.5},
};
const mat=(c,o={})=>new THREE.MeshStandardMaterial({color:c,roughness:o.r??0.9,metalness:0,emissive:o.e??0x000000,emissiveIntensity:o.ei??1});
function box(w,h,d,x,y,z,m){const me=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); me.position.set(x,y,z); town.add(me); return me;}
function sph(r,x,y,z,m){const me=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),m); me.position.set(x,y,z); town.add(me); return me;}

function build(L){
  curL=L;
  scene.remove(town); town.traverse(o=>{if(o.geometry)o.geometry.dispose();}); town=new THREE.Group(); scene.add(town);
  const wx=g=>(g-(L.W-1)/2)*GRID, wz=g=>(g-(L.H-1)/2)*GRID;
  const mRoad=mat(C.road,{r:1}), mWood=mat(C.wood), mStone=mat(C.stone),
        mTorii=mat(C.torii), mPlaza=mat(C.plaza,{r:1}), mLeaf=mat(C.leaf), mTrunk=mat(C.trunk), mShopK=mat(C.shopK,{r:1}),
        mAlleyF=mat(0x201f26,{r:1}), mAlleyW=mat(0x2a2630);
  const tint=(hex,f)=>{const r=Math.floor(((hex>>16)&255)*f),g=Math.floor(((hex>>8)&255)*f),b=Math.floor((hex&255)*f);return (r<<16)|(g<<8)|b;};
  const ZD=[1.0,0.82,0.95,0.6];  // ゾーン別の明るさ（奥ほど暗い＝濃度勾配）
  const mRoadZ=ZD.map(f=>mat(tint(C.road,f),{r:1})), mAlleyZ=ZD.map(f=>mat(tint(0x201f26,f),{r:1}));
  const ASTRIP=8, AOFF=8;  // 裏道の側壁（厚め）＝中央≈8studの細い道
  function alleyWalls(gx,gy,opens){
    for(const d of ['N','S','E','W'])if(!opens[d]){
      if(d==='N')box(GRID,WH,ASTRIP,wx(gx),WH/2,wz(gy)+AOFF,mAlleyW);
      else if(d==='S')box(GRID,WH,ASTRIP,wx(gx),WH/2,wz(gy)-AOFF,mAlleyW);
      else if(d==='E')box(ASTRIP,WH,GRID,wx(gx)+AOFF,WH/2,wz(gy),mAlleyW);
      else box(ASTRIP,WH,GRID,wx(gx)-AOFF,WH/2,wz(gy),mAlleyW);
    }
  }
  // 大通り沿いの店舗：1区画を複数の小店に分割（各店にシャッター間口＋色暖簾＋提灯）
  const SD=7, NSHOP=NS, GAP=1.0;   // 奥行き / 1区画の店数 / 店間の柱
  const mFrame=mat(0x2c2620), mSlat=mat(0x17161b), mSignS=mat(C.sign,{r:.6});
  function shopfront(gx,gy,d,colors){
    const v=DV[d], off=HALF-SD/2, inner=HALF-SD, ns=(d==='N'||d==='S');
    const fx=wx(gx), fz=wz(gy);
    // 建物本体（厚い・全幅）
    if(ns)box(GRID,WH,SD,fx,WH/2,fz+v[2]*off,mWood); else box(SD,WH,GRID,fx+v[0]*off,WH/2,fz,mWood);
    const unit=(GRID-GAP*(NSHOP+1))/NSHOP;
    for(let i=0;i<NSHOP;i++){
      const rgb=CRGB[colors[i]]??0xcccccc;
      const ao=-GRID/2+GAP+unit/2+i*(unit+GAP);
      const bx=ns?fx+ao:fx+v[0]*(inner+0.3), bz=ns?fz+v[2]*(inner+0.3):fz+ao;
      // 板シャッター（色・間口いっぱい＝隠れ色）
      box(ns?unit:0.7, WH*0.62, ns?0.7:unit, bx, WH*0.33, bz, mat(rgb,{e:rgb,ei:0.42,r:.55}));
      // 横スリット（板っぽさ）
      for(const sy of [0.27,0.45]) box(ns?unit:0.78, 0.45, ns?0.78:unit, bx, WH*sy, bz, mSlat);
      // 看板（上）
      box(ns?unit:0.5, WH*0.15, ns?0.5:unit, bx, WH*0.73, bz, mSignS);
    }
    // 店間の柱（区切り）
    for(let i=0;i<=NSHOP;i++){
      const ao=-GRID/2+GAP/2+i*(unit+GAP);
      const bx=ns?fx+ao:fx+v[0]*(inner+0.2), bz=ns?fz+v[2]*(inner+0.2):fz+ao;
      box(ns?GAP:1.0,WH,ns?1.0:GAP,bx,WH/2,bz,mFrame);
    }
  }
  function floor(gx,gy,m){box(GRID,FT,GRID,wx(gx),-FT/2,wz(gy),m);}
  function wall(gx,gy,d,m){const e=HALF-WT/2;
    if(d==='N'||d==='S')box(GRID,WH,WT,wx(gx),WH/2,wz(gy)+(d==='N'?e:-e),m);
    else box(WT,WH,GRID,wx(gx)+(d==='E'?e:-e),WH/2,wz(gy),m);}
  function lantern(gx,gy,d,color){const v=DV[d]; const rgb=CRGB[color]??0xcccccc;
    sph(1.2,wx(gx)+v[0]*(HALF-3),WH*0.5,wz(gy)+v[2]*(HALF-3),mat(rgb,{e:rgb,ei:0.95,r:0.4}));}
  // 床＋特殊
  for(const key in L.cells){const c=L.cells[key]; const z=c.zone??1;
    if(c.kind==='plaza'){floor(c.gx,c.gy,mPlaza); box(1.8,8,1.8,wx(c.gx),4,wz(c.gy),mTrunk); sph(5.5,wx(c.gx),10,wz(c.gy),mLeaf);}
    else if(c.kind==='shrine'){floor(c.gx,c.gy,mStone); alleyWalls(c.gx,c.gy,c.opens);
      sph(1.6,wx(c.gx),3.5,wz(c.gy),mat(0x6fa0d8,{e:0x4a78c8,ei:1,r:0.4}));}
    else if(c.kind==='hideroom'){floor(c.gx,c.gy,mStone); alleyWalls(c.gx,c.gy,c.opens);
      ['aka','ao','midori','ki','murasaki'].forEach((col,i)=>{const a=i/5*Math.PI*2; sph(1.0,wx(c.gx)+Math.cos(a)*7,WH*0.5,wz(c.gy)+Math.sin(a)*7,mat(CRGB[col],{e:CRGB[col],ei:0.95,r:0.4}));});}
    else if(c.kind==='koyakkey'){floor(c.gx,c.gy,mShopK);
      box(GRID*0.5,WH*1.5,GRID*0.5,wx(c.gx),WH*0.75,wz(c.gy),mat(0x9a52cc,{e:0x9a52cc,ei:0.75}));}
    else if(c.tier==='alley'){floor(c.gx,c.gy,mAlleyZ[z]); alleyWalls(c.gx,c.gy,c.opens);}
    else floor(c.gx,c.gy,mRoadZ[z]);
  }
  // ファサード＋色提灯／店内中央提灯
  // 店舗：色一致の詳細GLBを各間口に配置（未ロードなら箱シャッターにフォールバック）
  const rotY={N:Math.PI,S:0,E:-Math.PI/2,W:Math.PI/2};
  function placeShops(gx,gy,d,colors){
    const ns=(d==='N'||d==='S'), v=DV[d], unit=GRID/NSHOP, normOff=HALF-unit/2;
    for(let i=0;i<NSHOP;i++){
      const m=shopModels[colors[i]];
      if(!m){shopfront(gx,gy,d,colors);return;}
      const cl=m.clone();
      cl.position.set(ns?wx(gx)+(-GRID/2+unit*(i+0.5)):wx(gx)+v[0]*normOff, 0, ns?wz(gy)+v[2]*normOff:wz(gy)+(-GRID/2+unit*(i+0.5)));
      cl.rotation.y=rotY[d];
      town.add(cl);
    }
  }
  for(const h of L.hideSpots){const c=L.cells[h.gx+','+h.gy]; if(!c)continue;
    if(c.kind!=='shrine')placeShops(c.gx,c.gy,h.side,h.colors);}
  // 抜け道（藍色の暖簾＝逃げ道の目印・くぐって裏道へ）
  for(const p of (L.passages||[])){const c=L.cells[p.gx+','+p.gy]; if(!c)continue;
    const v=DV[p.side], e=HALF-WT/2, X=wx(c.gx), Z=wz(c.gy), ns=(p.side==='N'||p.side==='S');
    if(ns)box(GRID*0.52,WH*0.24,0.6,X,WH*0.6,Z+v[2]*e,mat(0x35468a,{e:0x24368a,ei:0.45}));
    else box(0.6,WH*0.24,GRID*0.52,X+v[0]*e,WH*0.6,Z,mat(0x35468a,{e:0x24368a,ei:0.45}));}
  // 鳥居
  const g=L.cells[L.goal.gx+','+L.goal.gy];
  if(g){const vert=g.opens.N||g.opens.S; const X=wx(g.gx),Z=wz(g.gy);
    function post(ox,oz){box(1.4,17,1.4,X+ox,8.5,Z+oz,mTorii);}
    if(vert){post(-8.5,0);post(8.5,0);box(22,1.6,1.6,X,17,Z,mTorii);box(19,1.2,1.2,X,15,Z,mTorii);}
    else{post(0,-8.5);post(0,8.5);box(1.6,1.6,22,X,17,Z,mTorii);box(1.2,1.2,19,X,15,Z,mTorii);}
    box(GRID-1,0.3,GRID-1,X,0.25,Z,mat(0x7a2a2a,{e:0x5a1a1a,ei:0.8}));
    const bm=new THREE.MeshStandardMaterial({color:0xff5f5f,emissive:0xff5f5f,emissiveIntensity:0.7,transparent:true,opacity:0.4});
    const beacon=new THREE.Mesh(new THREE.BoxGeometry(2.2,80,2.2),bm); beacon.position.set(X,40,Z); town.add(beacon);}
  // 火の見櫓（最奥の超遠ランドマーク＝出口方向の絶対基準・壁より高く見える）
  if(L.beaconTower){const X=wx(L.beaconTower.gx),Z=wz(L.beaconTower.gy),mY=mat(0x2a211a),mR=mat(C.torii);
    for(const ox of [-3,3])for(const oz of [-3,3])box(1.2,46,1.2,X+ox,23,Z+oz,mY);
    box(10,1.2,10,X,30,Z,mY); box(9,1.0,9,X,40,Z,mY); box(12.5,2,12.5,X,47,Z,mR);
    sph(2.2,X,49,Z,mat(0xffcf6e,{e:0xffb347,ei:1.15}));}
  // 八尺様の巡回点（薄い輪）＋鳥居前の張り込み（赤い輪）
  function ring(gx,gy,col,op,ir,or){const m=new THREE.Mesh(new THREE.RingGeometry(ir,or,28),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,side:THREE.DoubleSide})); m.rotation.x=-Math.PI/2; m.position.set(wx(gx),0.4,wz(gy)); town.add(m);}
  for(const p of (L.patrolNodes||[]))ring(p.gx,p.gy,0xcfc8bd,0.24,5,7);
  if(L.guardNode)ring(L.guardNode.gx,L.guardNode.gy,0xff6a6a,0.4,6,8.5);
  // 入口
  box(GRID*0.5,0.6,GRID*0.5,wx(L.start.gx),0.3,wz(L.start.gy),mat(0x4e8050,{e:0x2e6030,ei:0.7}));
  // 八尺様
  box(2.2,8.5,2.2,wx(L.yasaki.gx),4.25,wz(L.yasaki.gy),mat(C.yasaki,{r:0.7}));
  // お札
  for(const f of L.fragments){const rgb=CRGB[f.color]??C.fuda; box(1.6,2.6,0.22,wx(f.gx),4,wz(f.gy),mat(rgb,{e:rgb,ei:0.75}));}

  controls.target.set(0,0,0);
  if(!build._inited){const s=L.H*GRID; camera.position.set(s*0.42,s*0.72,s*0.85); build._inited=true;}
  controls.minDistance=10; controls.maxDistance=L.H*GRID*2.6; controls.update();

  let nc=0,road=0; for(const key in L.cells){nc++; if(L.cells[key].kind==='road')road++;}
  document.getElementById('stat').innerHTML=
    `seed <b>${L.seed}</b>／迷路 ${L.W}×${L.H}＝${nc}セル・隠れ色 ${L.hideSpots.length}・お札 ${L.fragments.length}（大通り偏重＋各ゾーン配分）<br>`+
    `入口(${L.start.gx},${L.start.gy})→鳥居(${L.goal.gx},${L.goal.gy})　ゾーン:安全→本通り→広場→鳥居前（奥ほど暗）　必ず連結`;
}

function topView(){const s=H*GRID; camera.position.set(0.001,s*1.25,0.001); controls.target.set(0,0,0); controls.update();}
function perspView(){const s=H*GRID; camera.position.set(s*0.42,s*0.72,s*0.85); controls.target.set(0,0,0); controls.update();}

// ───────── 歩行モード本体（人間／八尺様の2アバター） ─────────
function loadAvatar(r){
  const cfg=ROLES[r];
  return new Promise(res=>{ new GLTFLoader().load(cfg.glb, g=>{
    const obj=g.scene; obj.scale.setScalar(cfg.h/cfg.raw);
    obj.traverse(o=>{ if(o.isMesh){o.frustumCulled=false; if(o.material){o.material.metalness=0; o.material.roughness=0.85;}} });
    const mx=new THREE.AnimationMixer(obj);
    let ac=null; if(g.animations&&g.animations.length){ ac=mx.clipAction(g.animations[0]); ac.play(); ac.paused=true; }
    obj.visible=false; scene.add(obj);
    AVA[r]={obj, mixer:mx, action:ac, cfg};
    res();
  }, undefined, ()=>{ console.warn(cfg.glb+' 読込失敗'); res(); }); });
}
function loadAvatars(){ return Promise.all([loadAvatar('human'), loadAvatar('yasaki')]); }
// 役割を適用（アクティブなアバターへ切替＝性能・見た目・アニメを差し替え）
function applyRole(r){
  role=r; const a=AVA[r]; if(!a)return;
  for(const k in AVA){ if(AVA[k].obj)AVA[k].obj.visible=false; }
  walkChar=a.obj; mixer=a.mixer; walkAction=a.action;
  const c=a.cfg; CHAR_H=c.h; CHAR_FWD=c.fwd; WALK_SPD=c.walk; RUN_SPD=c.run; ANIM_TS=c.ts; ANIM_TS_RUN=c.tsRun;
  walkChar.position.set(player.x,0,player.z); walkChar.rotation.y=CHAR_FWD;
  walkChar.visible=(mode==='walk'&&view==='tps');
  const b=document.getElementById('role'); if(b)b.textContent=(role==='human')?'😈 八尺様になる':'🚶 人間にもどる';
}
function toggleRole(){ applyRole(role==='human'?'yasaki':'human'); }
const cellW=(g,n)=>(g-(n-1)/2)*GRID;
// 迷路の壁に当たる（セルベース：閉じた辺はクランプ、開いた辺は隣へ通す）
function clampMaze(nx,nz){
  const W=curL.W,H=curL.H;
  let gx=Math.max(0,Math.min(W-1,Math.round(nx/GRID+(W-1)/2)));
  let gy=Math.max(0,Math.min(H-1,Math.round(nz/GRID+(H-1)/2)));
  const c=curL.cells[gx+','+gy]; if(!c)return [nx,nz];
  const cx=cellW(gx,W), cz=cellW(gy,H); let lx=nx-cx, lz=nz-cz;
  const ext=(c.tier==='alley')?(8-4):(HALF-7);  // alley:4 / street:5（シャッター手前）
  const E=ext-CHAR_R;
  const lzp=c.opens.N?HALF:E, lzn=c.opens.S?HALF:E, lxp=c.opens.E?HALF:E, lxn=c.opens.W?HALF:E;
  if(lz>lzp)lz=lzp; if(lz<-lzn)lz=-lzn; if(lx>lxp)lx=lxp; if(lx<-lxn)lx=-lxn;
  return [cx+lx, cz+lz];
}
function enterWalk(){
  if(!curL||!AVA[role]){ alert('キャラ読込中です'); return; }
  mode='walk';
  player.x=cellW(curL.start.gx,curL.W); player.z=cellW(curL.start.gy,curL.H); player.yaw=0;
  view='tps'; document.getElementById('vtoggle').textContent='👁 一人称（V）';
  applyRole(role);            // アクティブなアバター＝性能・見た目・ラベルをセット
  if(walkChar)walkChar.visible=true;
  camRig.yaw=0; camRig.pitch=0.2;
  controls.enabled=false;
  document.getElementById('walkui').style.display='flex';
  document.getElementById('orbithint').style.display='none';
  document.getElementById('panel').style.display='none';
  document.getElementById('legend').style.display='none';
  const cv=renderer.domElement; if(cv.requestPointerLock)cv.requestPointerLock();
}
function exitWalk(){
  mode='orbit'; if(walkChar)walkChar.visible=false; controls.enabled=true;
  document.getElementById('walkui').style.display='none';
  document.getElementById('orbithint').style.display='';
  document.getElementById('panel').style.display='';
  document.getElementById('legend').style.display='';
  if(document.pointerLockElement&&document.exitPointerLock)document.exitPointerLock();
  perspView();
}
function toggleView(){ view=(view==='tps')?'fps':'tps';
  document.getElementById('vtoggle').textContent=(view==='tps')?'👁 一人称（V）':'👁 三人称（V）';
  if(view==='fps')camRig.pitch=Math.max(-0.25,Math.min(0.35,camRig.pitch)); }
document.getElementById('enter').onclick=enterWalk;
document.getElementById('exit').onclick=exitWalk;
document.getElementById('vtoggle').onclick=toggleView;
document.getElementById('role').onclick=toggleRole;
addEventListener('keydown',e=>{ keys[e.code]=true; if(e.code==='Escape'&&mode==='walk')exitWalk();
  if(e.code==='KeyV'&&mode==='walk')toggleView();
  if(e.code==='KeyB'&&mode==='walk')toggleRole();
  if(mode==='walk'&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault(); });
addEventListener('keyup',e=>{ keys[e.code]=false; });
addEventListener('mousemove',e=>{ if(mode==='walk'&&document.pointerLockElement){
  camRig.yaw-=e.movementX*0.0028; camRig.pitch=Math.max(-0.9,Math.min(1.2,camRig.pitch+e.movementY*0.0024)); }});
renderer.domElement.addEventListener('click',()=>{ if(mode==='walk'&&!document.pointerLockElement)renderer.domElement.requestPointerLock&&renderer.domElement.requestPointerLock(); });

function updateWalk(dt){
  let fx=0,fz=0;
  if(keys['KeyW']||keys['ArrowUp'])fz-=1; if(keys['KeyS']||keys['ArrowDown'])fz+=1;
  if(keys['KeyA']||keys['ArrowLeft'])fx-=1; if(keys['KeyD']||keys['ArrowRight'])fx+=1;
  const moving=(fx||fz), run=keys['ShiftLeft']||keys['ShiftRight'], spd=run?RUN_SPD:WALK_SPD;
  const cy=Math.cos(camRig.yaw), sy=Math.sin(camRig.yaw);
  if(moving){
    const len=Math.hypot(fx,fz); fx/=len; fz/=len;
    const wx2=sy*(-fz)-cy*fx, wz2=cy*(-fz)+sy*fx;  // 左右（ストレイフ）を画面基準に合わせる
    const [rx,rz]=clampMaze(player.x+wx2*spd*dt, player.z+wz2*spd*dt);
    player.x=rx; player.z=rz;
    let tyaw=Math.atan2(wx2,wz2)+CHAR_FWD, d=tyaw-player.yaw;
    while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI; player.yaw+=d*0.2;
  }
  walkChar.position.set(player.x,0,player.z); walkChar.rotation.y=player.yaw;
  if(walkAction){ walkAction.paused=!moving; walkAction.timeScale=run?ANIM_TS_RUN:ANIM_TS; }
  if(mixer)mixer.update(dt);
  const tag=document.getElementById('spdtag'); if(tag){ tag.textContent=run?'run 🏃':'walk'; tag.className=run?'run':''; }
  if(walkChar)walkChar.visible=(view==='tps');  // 一人称は自分の体を隠す
  if(view==='fps'){
    const ey=CHAR_H*0.92, p=camRig.pitch;
    camera.position.set(player.x, ey, player.z);
    camera.lookAt(player.x + sy*Math.cos(p), ey - Math.sin(p), player.z + cy*Math.cos(p));
  } else {
    // 三人称＝マウス上下で視点の高さを調整（上げる＝俯瞰／下げる＝背後）。壁に入ったら引き寄せ＝暗転防止
    const elev=Math.max(0.35,Math.min(1.45, 1.5 - camRig.pitch));
    const D=camRig.dist, back=Math.cos(elev)*D, up=Math.sin(elev)*D, headY=CHAR_H*0.55;
    const desired=new THREE.Vector3(player.x - sy*back, headY+up, player.z - cy*back);
    let camPos=desired;
    if(elev<0.95){ // 背後寄り視点のときだけ壁引き寄せ（俯瞰は壁を越えるので不要＝アップになりすぎ防止）
      const head=new THREE.Vector3(player.x, headY+1, player.z);
      const dv=desired.clone().sub(head), dl=dv.length(); dv.normalize();
      camRay.set(head, dv); camRay.far=dl;
      const hit=camRay.intersectObjects(town.children,true);
      if(hit.length)camPos=head.clone().add(dv.multiplyScalar(Math.max(2.2,hit[0].distance-1.2)));
    }
    camera.position.copy(camPos);
    camera.lookAt(player.x, headY, player.z);
  }
}

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);});
Promise.all([loadShops(), loadAvatars()]).then(()=>regen(7));
(function loop(){requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),0.05);
  if(mode==='walk')updateWalk(dt); else { controls.update(); if(mixer)mixer.update(0); }
  renderer.render(scene,camera);})();
</script>
</body>
