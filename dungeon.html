<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>八咫商店街 ダンジョンメーカー ── 迷路生成プレビュー</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0c0c12;color:#ece7dd;font-family:-apple-system,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;overflow:hidden}
  #app{position:fixed;inset:0}
  #hud{position:fixed;left:16px;top:14px;z-index:10;max-width:380px;pointer-events:none}
  #hud .ttl{font-size:18px;font-weight:700;letter-spacing:.04em;text-shadow:0 2px 8px #000}
  #hud .sub{font-size:12px;color:#9b9488;margin-top:3px;text-shadow:0 1px 4px #000}
  #stat{margin-top:8px;font-size:12px;color:#cfc7b8;line-height:1.7;background:#15131988;border:1px solid #2a2630;border-radius:8px;padding:8px 10px;display:inline-block;pointer-events:none}
  #panel{position:fixed;left:16px;bottom:16px;z-index:10;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#15131988;backdrop-filter:blur(6px);border:1px solid #2a2630;border-radius:12px;padding:10px 12px}
  button{background:#2a1f22;color:#e0897f;border:1px solid #5a3331;border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer;font-family:inherit}
  button:hover{background:#3a282b}
  button.go{background:#c0453b;color:#fff;border-color:#c0453b;font-weight:700}
  #seed{width:84px;background:#15131a;border:1px solid #3a3340;color:#ece7dd;border-radius:8px;padding:7px 10px;font-size:14px;text-align:center}
  label{font-size:12px;color:#9b9488}
  #legend{position:fixed;right:16px;top:14px;z-index:10;font-size:12px;color:#cfc7b8;background:#15131988;border:1px solid #2a2630;border-radius:8px;padding:9px 11px;line-height:1.85}
  #legend .d{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:middle;box-shadow:0 0 7px currentColor}
  .hint{position:fixed;right:16px;bottom:16px;z-index:10;font-size:12px;color:#6b655c}
  #pwgate{position:fixed;inset:0;z-index:99999;background:#0c0b0d;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#ece7dd}
  #pwgate input{background:#15131a;border:1px solid #3a3340;color:#ece7dd;border-radius:8px;padding:10px 14px;font-size:16px;width:220px;text-align:center;outline:none}
  #pwgate button{margin-top:12px;background:#c0453b;color:#fff;border:0;border-radius:8px;padding:9px 22px}
</style>
</head>
<body>
<div id="pwgate">
  <div style="font-size:20px;letter-spacing:.08em;margin-bottom:6px">八咫商店街 ダンジョンメーカー</div>
  <div style="color:#8f897e;font-size:13px;margin-bottom:16px">関係者限定 ・ パスワード</div>
  <input id="pwin" type="password" placeholder="password" autocomplete="off">
  <button id="pwbtn">入る</button>
  <div id="pwerr" style="color:#e0897f;font-size:13px;margin-top:10px;height:16px"></div>
</div>
<script>
(function(){var KEY='yata-gate-ok',g=document.getElementById('pwgate');
 if(sessionStorage.getItem(KEY)==='1'){g.remove();return;}
 function u(){var v=(document.getElementById('pwin').value||'').trim().toLowerCase();
  if(v==='vr2026'){try{sessionStorage.setItem(KEY,'1');}catch(e){}g.remove();}else{document.getElementById('pwerr').textContent='パスワードが違います';}}
 document.getElementById('pwbtn').onclick=u;
 document.getElementById('pwin').addEventListener('keydown',function(e){if(e.key==='Enter')u();});
 document.getElementById('pwin').focus();})();
</script>

<div id="app"></div>
<div id="hud">
  <div class="ttl">ダンジョンメーカー 迷路プレビュー</div>
  <div class="sub">LevelGenV2（実装と同一の迷路アルゴリズム）をブラウザで実行</div>
  <div id="stat"></div>
</div>
<div id="legend">
  <span class="d" style="background:#5ed07a;color:#5ed07a"></span>入口（START）<br>
  <span class="d" style="background:#c8382c;color:#c8382c"></span>鳥居（ゴール）<br>
  <span class="d" style="background:#cecabe;color:#cecabe"></span>八尺様<br>
  <span class="d" style="background:#e8e0be;color:#e8e0be"></span>お札<br>
  <span class="d" style="background:#9bc8ff;color:#9bc8ff"></span>神社<br>
  <span class="d" style="background:#b46cff;color:#b46cff"></span>コヤッキー店<br>
  <span style="font-size:11px;color:#8f897e">提灯＝隠れ色（赤青緑黄紫）</span>
</div>
<div id="panel">
  <button id="gen" class="go">🎲 別の迷路を生成</button>
  <label>seed</label><input id="seed" type="number" value="7">
  <button id="top">真上から</button>
  <button id="persp">斜めから</button>
</div>
<div class="hint">drag:回転 ・ wheel:ズーム ・ 右drag:移動</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ───────── LevelGenV2（迷路：再帰的バックトラッカー＋braid。Luau/Pythonと同一） ─────────
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const COLORS=['aka','ao','midori','ki','murasaki'];
const W=6,H=12,BRAID=0.4;
function generate(seed){
  const rng=mulberry32(seed>>>0);
  const D={N:[0,1],S:[0,-1],E:[1,0],W:[-1,0]}, OPP={N:'S',S:'N',E:'W',W:'E'};
  const ri=(a,b)=>a+Math.floor(rng()*(b-a+1)); const k=(x,y)=>x+','+y; const inb=(x,y)=>x>=0&&x<W&&y>=0&&y<H;
  const opens={}, all=[];
  for(let x=0;x<W;x++)for(let y=0;y<H;y++){opens[k(x,y)]={}; all.push([x,y]);}
  let sx=ri(0,W-1); const start={gx:sx,gy:0};
  const vis={[k(sx,0)]:1}, st=[[sx,0]];
  while(st.length){const c=st[st.length-1]; const nb=[];
    for(const d in D){const nx=c[0]+D[d][0],ny=c[1]+D[d][1]; if(inb(nx,ny)&&!vis[k(nx,ny)])nb.push([d,nx,ny]);}
    if(nb.length){const p=nb[ri(0,nb.length-1)]; opens[k(c[0],c[1])][p[0]]=1; opens[k(p[1],p[2])][OPP[p[0]]]=1; vis[k(p[1],p[2])]=1; st.push([p[1],p[2]]);}
    else st.pop();}
  const deg=o=>Object.keys(o).length;
  for(const c of all){const o=opens[k(c[0],c[1])];
    if(deg(o)===1&&rng()<BRAID){const cand=[];
      for(const d in D){const nx=c[0]+D[d][0],ny=c[1]+D[d][1]; if(inb(nx,ny)&&!o[d])cand.push([d,nx,ny]);}
      if(cand.length){const p=cand[ri(0,cand.length-1)]; o[p[0]]=1; opens[k(p[1],p[2])][OPP[p[0]]]=1;}}}
  const bfs=(ax,ay)=>{const dist={[k(ax,ay)]:0},q=[[ax,ay]]; let h=0;
    while(h<q.length){const c=q[h++]; for(const d in opens[k(c[0],c[1])]){const nx=c[0]+D[d][0],ny=c[1]+D[d][1],nk=k(nx,ny);
      if(opens[nk]&&dist[nk]===undefined){dist[nk]=dist[k(c[0],c[1])]+1; q.push([nx,ny]);}}} return dist;};
  const dstart=bfs(sx,0);
  const cells={}; for(const c of all)cells[k(c[0],c[1])]={gx:c[0],gy:c[1],kind:'road',opens:opens[k(c[0],c[1])]};
  let goal=start,gb=-1; for(const c of all){const kk=k(c[0],c[1]); const sc=(dstart[kk]??-1)*2+(deg(opens[kk])===1?1:0); if(sc>gb){gb=sc;goal={gx:c[0],gy:c[1]};}}
  cells[k(goal.gx,goal.gy)].kind='gate';
  const deads=all.filter(c=>deg(opens[k(c[0],c[1])])===1&&!(c[0]===start.gx&&c[1]===start.gy)&&!(c[0]===goal.gx&&c[1]===goal.gy));
  let shrine=null;
  if(deads.length){let b=-1; for(const c of deads){const dd=dstart[k(c[0],c[1])]??0; if(dd>b){b=dd;shrine={gx:c[0],gy:c[1]};}}}
  else{let bd=99; for(const c of all){if((c[0]===start.gx&&c[1]===start.gy)||(c[0]===goal.gx&&c[1]===goal.gy))continue; const dg=deg(opens[k(c[0],c[1])]); if(dg<bd){bd=dg;shrine={gx:c[0],gy:c[1]};}}}
  if(shrine)cells[k(shrine.gx,shrine.gy)].kind='shrine';
  let roadc=all.filter(c=>cells[k(c[0],c[1])].kind==='road'&&!(c[0]===start.gx&&c[1]===start.gy));
  for(let i=roadc.length-1;i>0;i--){const j=ri(0,i);[roadc[i],roadc[j]]=[roadc[j],roadc[i]];}
  roadc.sort((a,b)=>deg(opens[k(b[0],b[1])])-deg(opens[k(a[0],a[1])]));
  let plaza=null; if(roadc.length){plaza={gx:roadc[0][0],gy:roadc[0][1]}; cells[k(plaza.gx,plaza.gy)].kind='plaza';}
  let avail=all.filter(c=>cells[k(c[0],c[1])].kind==='road'&&(dstart[k(c[0],c[1])]??0)>=2);
  for(let i=avail.length-1;i>0;i--){const j=ri(0,i);[avail[i],avail[j]]=[avail[j],avail[i]];}
  const nshop=Math.min(avail.length,ri(5,8)); let koyakkey=null;
  for(let i=0;i<nshop;i++){const c=avail[i]; const cc=cells[k(c[0],c[1])]; cc.kind=i===0?'koyakkey':'shop'; cc.color=COLORS[ri(0,4)]; if(i===0)koyakkey={gx:c[0],gy:c[1]};}
  const hide=[];
  for(const c of all){const cc=cells[k(c[0],c[1])];
    if(cc.kind!=='shrine')for(const d of ['N','S','E','W'])if(!cc.opens[d])hide.push({gx:c[0],gy:c[1],side:d,color:COLORS[ri(0,4)]});
    if(cc.kind==='shop'||cc.kind==='koyakkey')hide.push({gx:c[0],gy:c[1],side:'C',color:cc.color});}
  let walk=all.filter(c=>!(c[0]===start.gx&&c[1]===start.gy)).map(c=>({gx:c[0],gy:c[1]}));
  for(let i=walk.length-1;i>0;i--){const j=ri(0,i);[walk[i],walk[j]]=[walk[j],walk[i]];}
  const fragments=walk.slice(0,Math.min(walk.length,5+ri(2,3)));
  let yas=start,yb=-1; for(const c of all){if(c[0]===goal.gx&&c[1]===goal.gy)continue; const dd=dstart[k(c[0],c[1])]??-1; if(dd>yb){yb=dd;yas={gx:c[0],gy:c[1]};}}
  return {seed,W,H,cells,hideSpots:hide,fragments,start,goal,yasaki:yas,plaza,shrine,koyakkey};
}

// ───────── ブロック形状（MapBuilderV2と同一寸法・GRID=24） ─────────
const GRID=24,HALF=12,WH=14,WT=1.4,FT=0.6;
const C={ road:0x302f38, wood:0x3a2a20, sign:0xcec4aa, torii:0x962c26, leaf:0x284e30, trunk:0x30241a,
  stone:0x60625e, plaza:0x46464c, fuda:0xe8e0be, yasaki:0xcecabe, shopK:0x3c3240 };
const CRGB={ aka:0xc8382c, ao:0x2f6fb0, midori:0x3f9d54, ki:0xd8b32a, murasaki:0x7b4ea3 };
const DV={N:[0,0,1],S:[0,0,-1],E:[1,0,0],W:[-1,0,0]};

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace; app.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0c0c12); scene.fog=new THREE.FogExp2(0x0c0c12,0.0016);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.5,3000);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true;
scene.add(new THREE.HemisphereLight(0xbcc4d6,0x2a2a32,1.45));
const dir=new THREE.DirectionalLight(0xfff4e6,1.7); dir.position.set(80,160,60); scene.add(dir);
scene.add(new THREE.AmbientLight(0x404048,0.5));

let town=new THREE.Group(); scene.add(town);
const mat=(c,o={})=>new THREE.MeshStandardMaterial({color:c,roughness:o.r??0.9,metalness:0,emissive:o.e??0x000000,emissiveIntensity:o.ei??1});
function box(w,h,d,x,y,z,m){const me=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); me.position.set(x,y,z); town.add(me); return me;}
function sph(r,x,y,z,m){const me=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),m); me.position.set(x,y,z); town.add(me); return me;}

function build(L){
  scene.remove(town); town.traverse(o=>{if(o.geometry)o.geometry.dispose();}); town=new THREE.Group(); scene.add(town);
  const wx=g=>(g-(L.W-1)/2)*GRID, wz=g=>(g-(L.H-1)/2)*GRID;
  const mRoad=mat(C.road,{r:1}), mWood=mat(C.wood), mStone=mat(C.stone), mSign=mat(C.sign,{r:.6}),
        mTorii=mat(C.torii), mPlaza=mat(C.plaza,{r:1}), mLeaf=mat(C.leaf), mTrunk=mat(C.trunk), mShopK=mat(C.shopK,{r:1});
  function floor(gx,gy,m){box(GRID,FT,GRID,wx(gx),-FT/2,wz(gy),m);}
  function wall(gx,gy,d,m){const e=HALF-WT/2;
    if(d==='N'||d==='S')box(GRID,WH,WT,wx(gx),WH/2,wz(gy)+(d==='N'?e:-e),m);
    else box(WT,WH,GRID,wx(gx)+(d==='E'?e:-e),WH/2,wz(gy),m);}
  function lantern(gx,gy,d,color){const v=DV[d]; const rgb=CRGB[color]??0xcccccc;
    sph(1.2,wx(gx)+v[0]*(HALF-3),WH*0.5,wz(gy)+v[2]*(HALF-3),mat(rgb,{e:rgb,ei:0.95,r:0.4}));}
  // 床＋特殊
  for(const key in L.cells){const c=L.cells[key];
    if(c.kind==='plaza'){floor(c.gx,c.gy,mPlaza); box(1.8,8,1.8,wx(c.gx),4,wz(c.gy),mTrunk); sph(5.5,wx(c.gx),10,wz(c.gy),mLeaf);}
    else if(c.kind==='shrine'){floor(c.gx,c.gy,mStone);
      for(const d of ['N','S','E','W'])if(!c.opens[d])wall(c.gx,c.gy,d,mWood);
      sph(1.6,wx(c.gx),3.5,wz(c.gy),mat(0x6fa0d8,{e:0x4a78c8,ei:1,r:0.4}));}
    else if(c.kind==='shop'||c.kind==='koyakkey'){const isK=c.kind==='koyakkey'; floor(c.gx,c.gy,isK?mShopK:mWood);
      if(isK)box(GRID*0.6,2,GRID*0.6,wx(c.gx),WH+1.2,wz(c.gy),mat(0x8c52b4,{e:0x8c52b4,ei:0.7}));}
    else floor(c.gx,c.gy,mRoad);
  }
  // ファサード＋色提灯／店内中央提灯
  for(const h of L.hideSpots){const c=L.cells[h.gx+','+h.gy]; if(!c)continue;
    if(h.side==='C'){const rgb=CRGB[h.color]??0xcccccc; sph(1.3,wx(c.gx),WH*0.5,wz(c.gy),mat(rgb,{e:rgb,ei:0.95,r:0.4}));}
    else if(c.kind!=='shrine'){wall(c.gx,c.gy,h.side,mWood); lantern(c.gx,c.gy,h.side,h.color);}}
  // 鳥居
  const g=L.cells[L.goal.gx+','+L.goal.gy];
  if(g){const vert=g.opens.N||g.opens.S; const X=wx(g.gx),Z=wz(g.gy);
    function post(ox,oz){box(1.4,17,1.4,X+ox,8.5,Z+oz,mTorii);}
    if(vert){post(-8.5,0);post(8.5,0);box(22,1.6,1.6,X,17,Z,mTorii);box(19,1.2,1.2,X,15,Z,mTorii);}
    else{post(0,-8.5);post(0,8.5);box(1.6,1.6,22,X,17,Z,mTorii);box(1.2,1.2,19,X,15,Z,mTorii);}
    box(GRID-1,0.3,GRID-1,X,0.25,Z,mat(0x7a2a2a,{e:0x5a1a1a,ei:0.8}));}
  // 入口
  box(GRID*0.5,0.6,GRID*0.5,wx(L.start.gx),0.3,wz(L.start.gy),mat(0x4e8050,{e:0x2e6030,ei:0.7}));
  // 八尺様
  box(2.2,8.5,2.2,wx(L.yasaki.gx),4.25,wz(L.yasaki.gy),mat(C.yasaki,{r:0.7}));
  // お札
  for(const f of L.fragments)box(1.6,2.6,0.22,wx(f.gx),4,wz(f.gy),mat(C.fuda,{e:0xb8a860,ei:0.6}));

  controls.target.set(0,0,0);
  if(!build._inited){const s=L.H*GRID; camera.position.set(s*0.42,s*0.72,s*0.85); build._inited=true;}
  controls.minDistance=10; controls.maxDistance=L.H*GRID*2.6; controls.update();

  let nc=0,road=0; for(const key in L.cells){nc++; if(L.cells[key].kind==='road')road++;}
  document.getElementById('stat').innerHTML=
    `seed <b>${L.seed}</b>／迷路 ${L.W}×${L.H}＝${nc}セル・隠れ色 ${L.hideSpots.length}・お札 ${L.fragments.length}<br>`+
    `入口(${L.start.gx},${L.start.gy}) → 鳥居(${L.goal.gx},${L.goal.gy})　必ず連結`;
}

function topView(){const s=H*GRID; camera.position.set(0.001,s*1.25,0.001); controls.target.set(0,0,0); controls.update();}
function perspView(){const s=H*GRID; camera.position.set(s*0.42,s*0.72,s*0.85); controls.target.set(0,0,0); controls.update();}

const seedEl=document.getElementById('seed');
function regen(seed){ seedEl.value=seed; build(generate(seed)); }
document.getElementById('gen').onclick=()=>regen((parseInt(seedEl.value||'0')||0)+1+Math.floor(Math.random()*9));
seedEl.onchange=()=>regen(parseInt(seedEl.value||'0')||0);
document.getElementById('top').onclick=topView;
document.getElementById('persp').onclick=perspView;

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight);});
regen(7);
(function loop(){requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera);})();
</script>
</body>
</html>
